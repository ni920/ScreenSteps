<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ScreenSteps</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <p class="eyebrow">ScreenSteps</p>
        <span id="statusPill" class="status-pill idle">Bereit</span>
      </section>

      <section class="controls">
        <button id="startButton" class="button button-primary">Record starten</button>
        <button id="stopButton" class="button button-secondary">Record stoppen</button>
        <button id="managerButton" class="button button-ghost button-manage">Verwalten</button>
      </section>

      <p id="message" class="message" aria-live="polite"></p>
    </main>

    <script src="../src/export-utils.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
